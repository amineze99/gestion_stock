<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bricallerie - Produits</title>
    <link rel="stylesheet" href="produits.css"> </head>
<body>
    <div class="dashboard-wrapper">
        <app-sidebar></app-sidebar>
        <script src="sidebar.js"></script>
        <main class="main-content">

            <header class="top-header">

                <h1>Produits</h1>

                <button class="btn-add" id="openModal">+ Ajouter un produit</button>
                

                <div id="productModal" class="modal">
                    <div class="modal-content">
                        <span class="close-btn" id="closeModal">&times;</span>
                        <h2>Nouveau Produit</h2>
                        <div class="input-group">
                            <label>Add a Photo of the product</label>
                            <input type="file" id="pImgInput" accept="image/*">
                            <img id="imgPreview" src="" style="width: 80px; height: 80px; display:none; margin-top:10px; border-radius: 5px; object-fit: cover;">
                        </div>
                        <form id="productForm" class="productForm">
                            <input type="text" id="pRef" placeholder="Référence (Unique)" required>
                            <input type="text" id="pName" placeholder="Désignation (Nom)" required>
                            <select id="pCategory" required>
                                <option value="">Sélectionner Catégorie</option>
                                <option value="1">Outillage</option> <option value="2">Électricité</option>
                            </select>
                            <input type="number" id="pStock" placeholder="Stock Initial" required>
                            <input type="number" id="pMinStock" placeholder="Quantité Min (Alerte)" value="5">
                            <input type="number" id="pBuyPrice" placeholder="Prix Achat (DA)" required>
                            <input type="number" id="pSellPrice" placeholder="Prix Vente (DA)" required>
                            <button type="submit" class="btn-save">Enregistrer</button>
                        </form>
                    </div> 
                </div>
            </header>

            <section class="content-body">

                <div class="table-container">

                    <table>

                        <thead>

                            <tr>

                                <th>Produit</th>

                                <th>Catégorie</th>

                                <th>Stock</th>

                                <th>Prix d'achat (DA)</th>

                                <th>Prix de vente (DA)</th>

                                <th>Fournisseur</th>

                                <th>Status</th>

                                <th>Actions</th>

                            </tr>

                        </thead>

                        <tbody id="productsTableBody">

                            </tbody>

                    </table>

                </div>

            </section>

        </main>

    </div>


    <script src="produits.js"></script>
    
</body>
</html>
