<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BRICODZ - Clients</title>
    <link rel="stylesheet" href="clients.css">
    <link rel="stylesheet" href="dark-theme.css">
    <script src="theme.js"></script>
    
</head>
<body>
    
    <div class="dashboard-wrapper">
        
        
        <app-sidebar></app-sidebar>
        <script src="sidebar.js"></script>
        <main class="main-content">
            <header class="top-header">
                <div class="header-titles"> <h1>Clients</h1>
                    <p>Gérer tous vos clients</p> </div>
                    <div class="search-filter-section"> <input type="text" placeholder="Rechercher par nom, email ou téléphone...">
                </div>
                <button class="btn-add" id="openClientModal">
                    <span class="plus-icon">+</span> Ajouter un client
                </button>
            </header> 
            <section class="content-body">
                <div class="client-grid" id="clientGrid"></div>
            </section>
        </main>
    </div>
    


    <div id="clientModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Ajouter un Nouveau Client</h2>
        <form id="addClientForm">
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" id="clientNom" placeholder="Nom du client" required>
                </div>
                <div class="form-group">
                    <label>Contact (Tél / Email)</label>
                    <input type="text" id="clientContact" placeholder="Ex: 0661000000">
                </div>
                
                <div class="form-group">
                    <label>Registre de Commerce</label>
                    <input type="text" id="clientRC" placeholder="Numéro de registre">
                </div>
                <div class="form-group">
                    <label>NIF</label>
                    <input type="text" id="clientNIF" placeholder="Numéro d'Identification Fiscale">
                </div>
                <div class="form-group">
                    <label>AI</label>
                    <input type="text" id="clientAI" placeholder="Numéro d'Identification de l'Administration des Impôts">
                </div>
                <div class="form-group">
                    <label>NIS</label>
                    <input type="text" id="clientNIS" placeholder="Numéro d'Identification Sociale">
                </div>
                <div class="form-group">
                    <label>Solde à payer (DA) </label>
                    <input type="number" id="clientSolde" value="0" step="0.01">
                </div>
                <button type="submit" class="btn-save">Enregistrer</button>
            </form>
        </div>
    </div>
    <div id="editClientModal" class="modal">
        <div class="modal-content">
            <span class="close-edit-btn" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <h2>Modifier le Client</h2>
            <form id="editClientForm">
                <input type="hidden" id="editClientId">
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" id="editClientNom" required>
                </div>
                <div class="form-group">
                    <label>Contact</label>
                    <input type="text" id="editClientContact">
                </div>
                <div class="form-group">
                    <label>Registre de Commerce</label>
                    <input type="text" id="editClientRC">
                </div>
                <div class="form-group">
                    <label>NIF</label>
                    <input type="text" id="editClientNIF">
                </div>
                <div class="form-group">
                    <label>AI</label>
                    <input type="text" id="editClientAI">
                </div>
                <div class="form-group">
                    <label>NIS</label>
                    <input type="text" id="editClientNIS">
                </div>
                <div class="form-group">
                    <label>Solde (DA)</label>
                    <input type="number" id="editClientSolde" step="0.01">
                </div>
                <button type="submit" class="btn-save">Mettre à jour</button>
            </form>
        </div>
    </div>
    <div id="salesModal" class="modal">
        <div class="modal-content">
            <span class="close-sales-btn" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <h2 id="salesModalClientName">Dernières Ventes</h2>
            <div id="salesModalContent" style="margin-top: 15px;">
                <!-- Sales list will be populated here dynamically -->
                <p>Chargement des données...</p>
            </div>
        </div>
    </div>
    <script src="clients.js"></script>
</body>
</html>
