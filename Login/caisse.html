<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bricallerie - Caisse</title>
        <link rel="stylesheet" href="dashbord.css">
        <link rel="stylesheet" href="caisse.css"> 
    </head>
<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar">
            <div class="sidebar-logo"><img src="photos/logo.png" alt="Logo"></div>
            <ul class="nav-links">
                <li><a href="dashbord.html">Dashboard</a></li>
                <li><a href="produits.html">Produits</a></li>
                <li><a href="clients.html">Clients</a></li>
                <li><a href="fournisseur.html">Fournisseurs</a></li>
                <li><a href="achats.html">Achats</a></li>
                <li><a href="ventes.html">Ventes</a></li>
                <li class="active"><a href="caisse.html">Caisse</a></li>
                <li><a href="parameters.html">Paramètres</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="search-bar"><h1>Gestion de Caisse</h1></div>
                <div class="user-profile"><button class="btn-add" id="openTransactionModal">+ Nouveau Règlement</button></div>
            </header>

            <section class="content-body">
                <div class="selection-container card" style="min-height: auto; margin-bottom: 20px;">
                    <h3>Filtrer par entité</h3>
                    <div style="display: flex; gap: 20px; margin-top: 15px;">
                        <select id="entitySelector" class="form-control">
                            <option value="client">Clients</option>
                            <option value="fournisseur">Fournisseurs</option>
                        </select>
                    </div>
                </div>

                <div id="entityGrid" class="stats-grid">
                    </div>
            </section>
        </main>
    </div>
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-wallet"></i> Règlement de solde</h2>
                <span class="close-btn">&times;</span>
            </div>
        
        <form id="transactionForm">
            <input type="hidden" id="selectedEntityId">
            <input type="hidden" id="selectedEntityType">
            
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Nom de l'entité</label>
                <input type="text" id="entityDisplayName" class="form-control readonly-input" disabled>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-credit-card"></i> Type de Règlement</label>
                    <select id="paymentType" class="form-control" required>
                        <option value="Versement">Espèces (Cash)</option>
                        <option value="Chèque">Chèque Bancaire</option>
                    </select>
                </div>
                
                    <div class="form-group">
                        <label><i class="fas fa-money-bill-wave"></i> Montant (DA)</label>
                        <input type="number" id="paymentAmount" class="form-control amount-input" required>
                    </div>
                </div>

                <div id="chequeDetails" class="form-group animate-fade" style="display: none;">
                    <label><i class="fas fa-barcode"></i> Numéro de Chèque</label>
                    <input type="text" id="numCheque" class="form-control" placeholder="0000 0000 0000">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Date de l'opération</label>
                    <input type="date" id="paymentDate" class="form-control" required>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-circle"></i> Valider le règlement
                </button>
            </form>
        </div>
    </div>

    <script src="caisse.js"></script>
</body>
</html>
