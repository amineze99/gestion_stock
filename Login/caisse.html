<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICODZ - Caisse</title>
    <link rel="stylesheet" href="dashbord.css">
    <link rel="stylesheet" href="caisse.css">
    <link rel="stylesheet" href="dark-theme.css">
    <script src="theme.js"></script>
</head>

<body>
    <div class="dashboard-wrapper">
        <app-sidebar></app-sidebar>
        <script src="sidebar.js"></script>

        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <h1>Gestion de Caisse</h1>
                </div>
                <div class="user-profile"><button class="btn-add" id="openTransactionModal">+ Nouveau Règlement</button>
                </div>
            </header>

            <section class="content-body">
                <div class="stats-grid" style="margin-bottom: 20px;">
                    <div class="stat-card" style="border-left: 4px solid #10b981;">
                        <div class="stat-info">
                            <p>Total Encaissements (Clients)</p>
                            <h2 id="stat-encaissements" style="color: #10b981;">0.00 DA</h2>
                        </div>
                    </div>
                    <div class="stat-card" style="border-left: 4px solid #ef4444;">
                        <div class="stat-info">
                            <p>Total Décaissements (Fournisseurs)</p>
                            <h2 id="stat-decaissements" style="color: #ef4444;">0.00 DA</h2>
                        </div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 350px 1fr; gap: 20px; align-items: start;">
                    <!-- LEFT COLUMN: PAYMENT FORM -->
                    <div class="card" style="min-height: auto;">
                        <h3 style="margin-bottom: 15px;">Nouveau Règlement</h3>
                        <form id="transactionForm">
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Type d'Entité</label>
                                <select id="entityTypeSelector" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
                                    <option value="client">Client</option>
                                    <option value="fournisseur">Fournisseur</option>
                                </select>
                            </div>
                            
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Sélectionner l'entité</label>
                                <select id="entitySelector" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
                                    <option value="">Chargement...</option>
                                </select>
                            </div>

                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Solde actuel</label>
                                <input type="text" id="currentSolde" class="form-control readonly-input" style="width: 100%; padding: 10px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px;" disabled value="0 DA">
                            </div>

                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Type de Règlement</label>
                                <select id="paymentType" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
                                    <option value="Espèce">Espèces (Cash)</option>
                                    <option value="Chèque">Chèque Bancaire</option>
                                    <option value="Virement">Virement</option>
                                </select>
                            </div>

                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Montant (DA)</label>
                                <input type="number" id="paymentAmount" class="form-control amount-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required min="1">
                            </div>

                            <div id="chequeDetails" class="form-group" style="display: none; margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Numéro de Chèque/Virement</label>
                                <input type="text" id="numCheque" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" placeholder="0000 0000 0000">
                            </div>

                            <div class="form-group" style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 5px; color: #475569; font-weight: 600;">Date</label>
                                <input type="date" id="paymentDate" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
                            </div>

                            <input type="hidden" id="transactionId" value="">
                            <div id="editModeActions" style="display: none; margin-bottom: 15px;">
                                <button type="button" id="cancelEditBtn" class="btn-secondary" style="width: 100%; padding: 12px; font-weight: bold; background: #64748b; color: white; border: none; border-radius: 6px; cursor: pointer;">
                                    Annuler la modification
                                </button>
                            </div>

                            <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; font-weight: bold; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer;">
                                Valider le règlement
                            </button>
                        </form>
                    </div>

                    <!-- RIGHT COLUMN: HISTORY TABLE -->
                    <div class="card" style="min-height: auto;">
                        <h3 style="margin-bottom: 15px;">Historique des Transactions</h3>
                        <table class="main-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Entité</th>
                                    <th>Méthode</th>
                                    <th>N° Réf</th>
                                    <th>Montant</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="transactionsTableBody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

    <script src="caisse.js"></script>
</body>

</html>
