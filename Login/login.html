<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricallerie - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="login-container">
        <div class="login-left">
            <div class="login-box">
                <div class="logo">
                    <h2>BRICALLERIE</h2>
                    <p>HARDWARE MANAGEMENT</p>
                </div>
                
                <h1>Welcome Back</h1> 
                <p class="subtitle">Sign in to access your hardware store management panel</p> <form id="loginForm">
                    <div class="input-group">
                        <label for="email">E-MAIL </label> <input type="email" id="email" placeholder="you@example.com" required style="text-align: left; direction: ltr;">
                    </div>
                    <div class="input-group">
                        <label for="password">Password </label> <input type="password" id="password" placeholder="••••••••" required style="text-align: left; direction: ltr;">
                    </div>
                    
                    <div class="options">
                        <label class="remember-me"><input type="checkbox"> Remember Me</label> <a href="#">Forgot Password?</a> </div>

                    <button type="submit" class="btn-login">Login  </button> </form>

                <div class="demo-box">
                    <p>Demo Infromations:</p>
                    <p>E-MAIL : demo@bricallerie.com</p>
                    <p>Password: demo123</p>
                </div>
            </div>
        </div>

        <div class="login-right">
            <img src="photos/login.png" alt="Bricallerie Login Visual">
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
